<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Barber Kev's | Registro</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/auth.css">
</head>
<body class="pagina-acceso">
    <main class="contenedor-acceso">
        <section class="tarjeta-acceso tarjeta-acceso-ancha">
            <a href="index.html" class="marca-acceso">
                <span class="icono-marca-acceso">&#9986;</span>
                <span>Barber Kev's</span>
            </a>
            <header class="encabezado-acceso">
                <h1>Crea tu Cuenta</h1>
                <p>Regístrate para agendar citas, consultar servicios y administrar tu perfil.</p>
            </header>
            <form class="formulario-acceso" action="login.html">
                <div class="rejilla-acceso">
                    <div>
                        <label for="nombre">Nombre</label>
                        <div class="campo-icono">
                            <span class="icono-campo" aria-hidden="true"><i class="bi bi-person"></i></span>
                            <input id="nombre" type="text" placeholder="Kevin" required>
                        </div>
                    </div>
                    <div>
                        <label for="apellidos">Apellidos</label>
                        <div class="campo-icono">
                            <span class="icono-campo" aria-hidden="true"><i class="bi bi-person-vcard"></i></span>
                            <input id="apellidos" type="text" placeholder="Don" required>
                        </div>
                    </div>
                </div>
                <label for="correo-registro">Correo Electrónico</label>
                <div class="campo-icono">
                    <span class="icono-campo" aria-hidden="true"><i class="bi bi-envelope"></i></span>
                    <input id="correo-registro" type="email" placeholder="correo@ejemplo.com" required>
                </div>
                <label for="telefono">Número de Teléfono</label>
                <div class="campo-icono">
                    <span class="icono-campo" aria-hidden="true"><i class="bi bi-telephone"></i></span>
                    <input id="telefono" type="tel" placeholder="487-123-4567" required>
                </div>
                <div class="rejilla-acceso">
                    <div>
                        <label for="clave-registro">Contraseña</label>
                        <div class="campo-icono">
                            <span class="icono-campo" aria-hidden="true"><i class="bi bi-shield-lock"></i></span>
                            <input id="clave-registro" type="password" placeholder="Mínimo 8 caracteres" minlength="8" required>
                        </div>
                    </div>
                    <div>
                        <label for="confirmar-clave">Confirmar Contraseña</label>
                        <div class="campo-icono">
                            <span class="icono-campo" aria-hidden="true"><i class="bi bi-check2-circle"></i></span>
                            <input id="confirmar-clave" type="password" placeholder="Repite tu contraseña" required>
                        </div>
                    </div>
                </div>
                <button type="submit" class="boton-acceso">Finalizar Registro</button>
            </form>
            <p class="texto-registro">¿Ya tienes cuenta? <a href="login.html" class="enlace-dorado">Inicia sesión</a></p>
            <a href="index.html" class="enlace-volver">&larr; Volver al inicio</a>
        </section>
    </main>
</body>
</html>
