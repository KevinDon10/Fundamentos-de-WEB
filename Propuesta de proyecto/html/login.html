<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Barber Kev's | Iniciar Sesión</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/auth.css">
</head>
<body class="pagina-acceso">
    <main class="contenedor-acceso">
        <section class="tarjeta-acceso">
            <a href="index.html" class="marca-acceso">
                <span class="icono-marca-acceso">&#9986;</span>
                <span>Barber Kev's</span>
            </a>
            <header class="encabezado-acceso">
                <h1>Bienvenido de Nuevo</h1>
                <p>Inicia sesión para acceder a tu cuenta y revisar tus citas.</p>
            </header>
            <form class="formulario-acceso" action="index.html">
                <label for="correo-login">Correo Electrónico</label>
                <div class="campo-icono">
                    <span class="icono-campo" aria-hidden="true"><i class="bi bi-envelope"></i></span>
                    <input id="correo-login" type="email" placeholder="correo@ejemplo.com" required>
                </div>
                <label for="clave-login">Contraseña</label>
                <div class="campo-icono">
                    <span class="icono-campo" aria-hidden="true"><i class="bi bi-lock"></i></span>
                    <input id="clave-login" type="password" placeholder="Ingresa tu contraseña" required>
                    <button type="button" class="boton-ver-clave" aria-label="Mostrar contraseña">
                        <i class="bi bi-eye"></i>
                    </button>
                </div>
                <div class="meta-acceso">
                    <a href="#" class="enlace-dorado">¿Olvidaste tu contraseña?</a>
                </div>
                <button type="submit" class="boton-acceso">Iniciar Sesión</button>
            </form>
            <p class="texto-registro">¿No tienes cuenta? <a href="registro.html" class="enlace-dorado">Regístrate aquí</a></p>
            <a href="index.html" class="enlace-volver">&larr; Volver al inicio</a>
        </section>
    </main>
</body>
</html>
