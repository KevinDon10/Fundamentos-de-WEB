<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>1 Input para RGB</title>

   <style>
         .container {
            display: flex;
            flex-wrap: wrap;
            gap: 5px;
            margin-top: 20px;
        }

        .element {
            width: 200px;
            height: 200px;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
            font-weight: bold;
            border: 1px solid #ccc;
        }
    </style>
</head>

<body>

    <button onclick="crearElemento()">Agregar elemento</button>
    <input type="text" id="texto-elemento" placeholder="Escribe algo aquí...">
    
    <br><br>

    <label for="colorPicker">Selecciona un color:</label>
    <input type="color" id="colorPicker"> 
    <br><br>

    <div class="container"></div>

    <script>
        const container = document.querySelector(".container");
        const inputTexto = document.getElementById("texto-elemento");
        const picker = document.getElementById("colorPicker");

        function crearElemento() {
            const colorSeleccionado = picker.value;

            const element = document.createElement("div");
            element.classList.add("element");
            
            element.style.backgroundColor = colorSeleccionado;
            
            element.textContent = inputTexto.value || colorSeleccionado;
            
            container.appendChild(element);

            inputTexto.value = "";
        }
    </script>
</body>

</html>
