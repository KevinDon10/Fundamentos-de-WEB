<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3 Inputs para RGB</title>

    <style>
        .container {
            display: flex;
            flex-wrap: wrap;
            gap: 5px;
            margin-top: 20px;
        }

        .element {
            width: 200px;
            height: 200px;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
            font-weight: bold;
            border: 1px solid #ccc;
        }
    </style>
</head>

<body>

    <button onclick="crearElemento()">Agregar elemento</button>
    <input type="text" id="texto-elemento" placeholder="Escribe algo aquí...">
    <br><br>

    <label for="r">R</label>
    <input type="number" id="inputR" min="0" max="255">
    <label for="g">G</label>
    <input type="number" id="inputG" min="0" max="255">
    <label for="b">B</label>
    <input type="number" id="inputB" min="0" max="255">

    <br><br>

    <div class="container"></div>

    <script>
        const container = document.querySelector(".container");
        const inputTexto = document.getElementById("texto-elemento");

        const rVal = document.getElementById("inputR");
        const gVal = document.getElementById("inputG");
        const bVal = document.getElementById("inputB");

        function crearElemento() {
            const r = rVal.value || 0;
            const g = gVal.value || 0;
            const b = bVal.value || 0;

            const element = document.createElement("div");
            element.classList.add("element");

            element.style.backgroundColor = `rgb(${r}, ${g}, ${b})`;

            element.textContent = inputTexto.value || "Sin texto";
            container.appendChild(element);

            inputTexto.value = "";
        }
    </script>
</body>

</html>
