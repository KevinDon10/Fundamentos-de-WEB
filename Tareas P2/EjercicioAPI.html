<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ejercicio API</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f0f2f5;
            margin: 0;
            padding: 20px;
        }

        .grid-container {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            justify-content: center;
        }

        .card {
            background-color: white;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            width: 200px;
            overflow: hidden;
            text-align: center;
        }

        .card img {
            width: 100%;
            height: 200px;
            object-fit: cover;
        }

        .card h3 {
            margin: 10px;
            font-size: 1.1rem;
            color: black;
            padding: 0 5px 10px 5px;
        }
    </style>
</head>

<body onload="cargar()">

    <h1>Personajes de Rick and Morty</h1>

    <div id="contenedor-personajes" class="grid-container">
        
    </div>

    <script>
        async function cargar() {
            const contenedor = document.getElementById("contenedor-personajes");

            try {
                const response = await fetch("https://rickandmortyapi.com/api/character");

                const result = await response.json();
                const personajes = result.results;

                for (let i = 0; i < personajes.length; i++) {
                    const personaje = personajes[i];

                    const cardDiv = document.createElement("div");
                    cardDiv.classList.add("card");

                    const imagenElemento = document.createElement("img");
                    imagenElemento.src = personaje.image; 

                    const nombreElemento = document.createElement("h3");
                    nombreElemento.textContent = personaje.name; 

                    cardDiv.appendChild(imagenElemento);
                    cardDiv.appendChild(nombreElemento);
                    contenedor.appendChild(cardDiv);
                }

            } catch (error) {
                console.error("Hubo un problema:", error);
                contenedor.innerHTML = "<p>Error al cargar los personajes. Inténtalo de nuevo más tarde.</p>";
            }
        }
    </script>
</body>

</html>
